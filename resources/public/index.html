<!DOCTYPE html>
<html lang="en" data-theme="dark" data-ui-font="system">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Hyperopen - Open Source Trading Interface"
    />
    <title>Hyperopen</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <div id="app" class="h-full">
      <!-- App content will be rendered here -->
    </div>
    <script>
      (function () {
        const manifestUrl = "/js/manifest.json";
        const defaultMainScriptUrl = "/js/main.js";

        function normalizeScriptUrl(outputName) {
          if (typeof outputName !== "string" || outputName.length === 0) {
            return null;
          }

          if (outputName.startsWith("/")) {
            return outputName;
          }

          const normalized = outputName.replace(/^\.?\//, "");
          return normalized.startsWith("js/") ? `/${normalized}` : `/js/${normalized}`;
        }

        function resolveMainScriptUrl(manifest) {
          if (!Array.isArray(manifest)) {
            return null;
          }

          for (const moduleInfo of manifest) {
            if (!moduleInfo || typeof moduleInfo !== "object") {
              continue;
            }

            const moduleId =
              moduleInfo["module-id"] ??
              moduleInfo.moduleId ??
              moduleInfo.name;

            if (moduleId === "main" || moduleId === ":main") {
              return normalizeScriptUrl(
                moduleInfo["output-name"] ?? moduleInfo.outputName
              );
            }
          }

          return null;
        }

        function loadMainScript(src) {
          const script = document.createElement("script");
          script.src = src;
          document.body.appendChild(script);
        }

        fetch(manifestUrl, { cache: "no-cache" })
          .then((response) => (response.ok ? response.json() : null))
          .then((manifest) => {
            loadMainScript(resolveMainScriptUrl(manifest) || defaultMainScriptUrl);
          })
          .catch(() => {
            loadMainScript(defaultMainScriptUrl);
          });
      })();
    </script>
  </body>
</html>
